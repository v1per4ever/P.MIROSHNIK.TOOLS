<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P.MIROSHNIK.TOOLS | Рабочие инструменты</title>
    
                
            
            
    <!-- Google Fonts: Inter (Neo-grotesque) & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        swiss: {
                            black: '#0A0A0A',
                            white: '#FFFFFF',
                            gray: '#E5E5E5',
                            lightGray: '#F5F5F5',
                            accent: '#0000FF', // Pure Digital Blue
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    letterSpacing: {
                        tighter: '-0.04em',
                        tight: '-0.02em',
                        widest: '0.1em',
                    },
                    animation: {
                        'marquee': 'marquee 20s linear infinite',
                    },
                    keyframes: {
                        marquee: {
                            '0%': { transform: 'translateX(0%)' },
                            '100%': { transform: 'translateX(-50%)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #FFFFFF;
            color: #0A0A0A;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::selection {
            background-color: #0000FF;
            color: #FFFFFF;
        }

        /* Minimalist Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #FFFFFF; border-left: 1px solid #E5E5E5; }
        ::-webkit-scrollbar-thumb { background: #0A0A0A; }
        ::-webkit-scrollbar-thumb:hover { background: #0000FF; }

        .marquee-container {
            display: flex;
            width: 200%;
        }

        /* Strict focus rings */
        input:focus {
            outline: none;
            border-color: #0000FF;
            box-shadow: none;
        }
        
        /* Grid system border hacks for perfect 1px lines */
        .swiss-grid-container {
            background-color: #0A0A0A;
            gap: 1px;
        }
        .swiss-grid-item {
            background-color: #FFFFFF;
        }
    </style>
    <link rel="stylesheet" href="/src/index.css" />
</head>
<body>
    <!-- Hidden form for Netlify's build bots to parse -->
    <form name="feedback" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
        <input type="hidden" name="form-name" value="feedback" />
        <input type="email" name="email" />
        <textarea name="message"></textarea>
    </form>

    <div id="root"></div>

    <script type="module" src="/src/index.jsx"></script>
</body>
</html>
