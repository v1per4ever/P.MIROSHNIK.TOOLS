<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linguistic Editor | P.MIROSHNIK.TOOLS</title>
    
                
            
            
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F5F5F5; color: #0A0A0A; }
        .swiss-border { border: 2px solid #0A0A0A; }
        .swiss-border-b { border-bottom: 2px solid #0A0A0A; }
        .swiss-border-r { border-right: 2px solid #0A0A0A; }
        .swiss-shadow { box-shadow: 4px 4px 0px 0px #0A0A0A; }
        .swiss-shadow-hover:hover { box-shadow: 6px 6px 0px 0px #0A0A0A; transform: translate(-2px, -2px); }
        .swiss-transition { transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #F5F5F5; border-left: 1px solid #E5E5E5; border-top: 1px solid #E5E5E5; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #0A0A0A; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #0000FF; }
        
        .ribbon-mock {
            background-color: #0000FF;
            color: #FFFFFF;
            position: relative;
        }
        .ribbon-mock::before, .ribbon-mock::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 16px;
            background-color: #0A0A0A;
        }
        .ribbon-mock::before { left: -4px; }
        .ribbon-mock::after { right: -4px; }
    </style>
    <link rel="stylesheet" href="/src/index.css" />
</head>
<body>
    <div id="root"></div>

    <script type="module" src="/src/ribbon.jsx"></script>
</body>
</html>
