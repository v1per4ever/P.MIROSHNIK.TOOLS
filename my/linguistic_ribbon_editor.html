<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linguistic Editor | P.MIROSHNIK.TOOLS</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone@7.18.0/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        swiss: {
                            black: '#0A0A0A',
                            white: '#FFFFFF',
                            gray: '#E5E5E5',
                            light: '#F5F5F5',
                            accent: '#0000FF'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F5F5F5; color: #0A0A0A; }
        .swiss-border { border: 2px solid #0A0A0A; }
        .swiss-border-b { border-bottom: 2px solid #0A0A0A; }
        .swiss-border-r { border-right: 2px solid #0A0A0A; }
        .swiss-shadow { box-shadow: 4px 4px 0px 0px #0A0A0A; }
        .swiss-shadow-hover:hover { box-shadow: 6px 6px 0px 0px #0A0A0A; transform: translate(-2px, -2px); }
        .swiss-transition { transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #F5F5F5; border-left: 1px solid #E5E5E5; border-top: 1px solid #E5E5E5; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #0A0A0A; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #0000FF; }
        
        .ribbon-mock {
            background-color: #0000FF;
            color: #FFFFFF;
            position: relative;
        }
        .ribbon-mock::before, .ribbon-mock::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 16px;
            background-color: #0A0A0A;
        }
        .ribbon-mock::before { left: -4px; }
        .ribbon-mock::after { right: -4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SwissButton = ({ children, onClick, variant = 'primary', className = '', disabled = false }) => {
            const baseStyle = "font-mono font-bold uppercase py-2 px-4 swiss-border swiss-transition text-xs tracking-wider text-center flex items-center justify-center";
            const variants = {
                primary: "bg-swiss-accent text-white swiss-shadow hover:bg-black",
                secondary: "bg-white text-black swiss-shadow hover:bg-swiss-light",
                outline: "bg-transparent text-black border-2 border-black hover:bg-black hover:text-white"
            };
            
            return (
                <button 
                    onClick={onClick} 
                    disabled={disabled}
                    className={`${baseStyle} ${variants[variant]} ${disabled ? 'opacity-50 cursor-not-allowed' : 'swiss-shadow-hover'} ${className}`}
                >
                    {children}
                </button>
            );
        };

        const NavHeader = () => (
            <nav className="swiss-border-b bg-white p-4 flex justify-between items-center sticky top-0 z-50">
                <div className="flex items-center gap-4">
                    <a href="../index.html" className="font-mono font-bold text-xl tracking-tighter hover:text-swiss-accent swiss-transition">
                        P.MIROSHNIK<span className="text-swiss-accent">.TOOLS</span>
                    </a>
                    <span className="font-mono text-sm text-gray-500 bg-swiss-light px-2 py-1 swiss-border">/ linguistic-editor</span>
                </div>
            </nav>
        );

        // Core Linguistic Logic
        const cleanPhraseText = (text) => {
            if (!text) return "";
            let cleaned = text.trim();

            if (cleaned.startsWith('"') && cleaned.endsWith('"')) {
                cleaned = cleaned.substring(1, cleaned.length - 1);
            }
            cleaned = cleaned.replace(/""/g, '"');

            const suffixes = [
                /спортивная$/i, /фиолет$/i, /синяя$/i, /синий$/i, /крас$/i, 
                /лучшие$/i, /набор$/i, /флаг$/i, /чир спорт$/i, /ая$/i, /ый$/i
            ];

            for (let regex of suffixes) {
                if (regex.test(cleaned)) {
                    cleaned = cleaned.replace(regex, '').trim();
                    break;
                }
            }

            if (cleaned.toLowerCase().startsWith('медали ')) {
                cleaned = cleaned.substring(7).trim();
            }

            const dict = {
                'актер': 'актёр', 'волонтер': 'волонтёр', 'звездочке': 'звёздочке',
                'муз\\. школы': 'музыкальной школы', 'коллект\\.': 'коллектив',
                'достиж\\.': 'достижения', 'акробатич\\.': 'акробатическом',
                'воскрески': 'воскресной школы', 'семьилюбви': 'семьи, любви',
                'с днем': 'С Днём', 'с днём': 'С Днём', 'россии': 'России',
                '5 мая': '5 метров', ' 06гая': ''
            };

            for (let [key, val] of Object.entries(dict)) {
                let regex = new RegExp(key, 'gi');
                cleaned = cleaned.replace(regex, val);
            }

            cleaned = cleaned.replace(/\s+-\s+/g, ' — ');
            cleaned = cleaned.replace(/\s+/g, ' ').trim();
            if (cleaned.length > 0) {
                cleaned = cleaned.charAt(0).toUpperCase() + cleaned.slice(1);
            }

            return cleaned;
        };

        const splitPhraseSemantically = (text) => {
            if (!text) return { line1: "", line2: "" };
            let words = text.split(/\s+/);
            if (words.length <= 1) return { line1: text, line2: "" };
            if (words.length === 2) return { line1: words[0], line2: words[1] };

            const prepositions = ['к', 'в', 'за', 'с', 'у', 'о', 'об', 'по', 'из', 'от', 'под', 'над', 'для', 'без', 'при', 'обо', 'со', 'во', 'но', 'а', 'да', 'или', 'и', 'на', 'моих', 'своей', 'наш'];

            let bestSplitIndex = Math.floor(words.length / 2);
            let minDiff = Infinity;

            for (let i = 1; i < words.length; i++) {
                let part1 = words.slice(0, i).join(' ');
                let part2 = words.slice(i).join(' ');

                let endsWithPreposition = prepositions.includes(words[i-1].toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,""));
                
                let diff = Math.abs(part1.length - part2.length);
                if (endsWithPreposition) {
                    diff += 30; // Heavy penalty
                }

                if (diff < minDiff) {
                    minDiff = diff;
                    bestSplitIndex = i;
                }
            }

            return {
                line1: words.slice(0, bestSplitIndex).join(' '),
                line2: words.slice(bestSplitIndex).join(' ')
            };
        };

        const defaultData = [
            { original: "за любовь к танцам", cleaned: "За любовь к танцам", line1: "За любовь", line2: "к танцам" },
            { original: "Лучшие родители моих учеников", cleaned: "Лучшие родители моих учеников", line1: "Лучшие родители", line2: "моих учеников" },
            { original: "Лучшим родителям", cleaned: "Лучшим родителям", line1: "Лучшим", line2: "родителям" },
            { original: "За любовь к танцамфиолет", cleaned: "За любовь к танцам", line1: "За любовь", line2: "к танцам" },
            { original: "за любовь к театру", cleaned: "За любовь к театру", line1: "За любовь", line2: "к театру" },
            { original: "Ты звездаая", cleaned: "Ты — звезда!", line1: "Ты —", line2: "звезда!" },
            { original: "Гордость школы танцевфиолет", cleaned: "Гордость школы танцев", line1: "Гордость", line2: "школы танцев" },
            { original: "Юной звездочке", cleaned: "Юной звёздочке", line1: "Юной", line2: "звёздочке" }
        ];

        const LinguisticApp = () => {
            const [phrases, setPhrases] = useState(defaultData);
            const [activeIndex, setActiveIndex] = useState(0);
            const [searchQuery, setSearchQuery] = useState("");
            const [isImportModalOpen, setIsImportModalOpen] = useState(false);
            const [importText, setImportText] = useState("");

            const filteredIndices = useMemo(() => {
                const query = searchQuery.toLowerCase();
                if (!query) return phrases.map((_, i) => i);
                return phrases.map((p, i) => {
                    if (p.original.toLowerCase().includes(query) || 
                        p.cleaned.toLowerCase().includes(query) || 
                        p.line1.toLowerCase().includes(query) || 
                        p.line2.toLowerCase().includes(query)) return i;
                    return -1;
                }).filter(i => i !== -1);
            }, [phrases, searchQuery]);

            const handleCleanChange = (index, value) => {
                const newPhrases = [...phrases];
                newPhrases[index].cleaned = value;
                const split = splitPhraseSemantically(value);
                newPhrases[index].line1 = split.line1;
                newPhrases[index].line2 = split.line2;
                setPhrases(newPhrases);
            };

            const handleLineChange = (index, lineNum, value) => {
                const newPhrases = [...phrases];
                if (lineNum === 1) newPhrases[index].line1 = value;
                else newPhrases[index].line2 = value;
                setPhrases(newPhrases);
            };

            const handleImport = () => {
                if (!importText.trim()) return;
                const newLines = importText.split('\n').filter(l => l.trim() !== "");
                const newPhrases = newLines.map(line => {
                    const cleaned = cleanPhraseText(line);
                    const split = splitPhraseSemantically(cleaned);
                    return {
                        original: line.trim(),
                        cleaned: cleaned,
                        line1: split.line1,
                        line2: split.line2
                    };
                });
                setPhrases([...newPhrases]);
                setActiveIndex(0);
                setIsImportModalOpen(false);
                setImportText("");
            };

            const exportCSV = () => {
                let csvContent = "\uFEFFИсходная фраза;Очищенная фраза;Строка 1 (Левый столбец);Строка 2 (Правый столбец)\r\n";
                phrases.forEach(row => {
                    const orig = `"${row.original.replace(/"/g, '""')}"`;
                    const clean = `"${row.cleaned.replace(/"/g, '""')}"`;
                    const l1 = `"${row.line1.replace(/"/g, '""')}"`;
                    const l2 = `"${row.line2.replace(/"/g, '""')}"`;
                    csvContent += `${orig};${clean};${l1};${l2}\r\n`;
                });

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `linguistic_cleaned_${Date.now()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const activePhrase = phrases[activeIndex] || { original: "", cleaned: "", line1: "", line2: "" };

            return (
                <div className="min-h-screen flex flex-col p-4 lg:p-8">
                    
                    {/* Toolbar */}
                    <div className="flex flex-col sm:flex-row gap-4 justify-between items-center bg-white swiss-border p-4 mb-8">
                        <div>
                            <h1 className="text-xl font-bold font-mono uppercase tracking-tight">ЛИНГВИСТИЧЕСКИЙ РЕДАКТОР</h1>
                            <p className="text-sm font-mono text-gray-500">Очистка тегов и семантический перенос строк</p>
                        </div>
                        <div className="flex gap-2">
                            <SwissButton variant="outline" onClick={() => setIsImportModalOpen(true)}>
                                ИМПОРТ ФРАЗ
                            </SwissButton>
                            <SwissButton variant="primary" onClick={exportCSV}>
                                СКАЧАТЬ CSV
                            </SwissButton>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                        
                        {/* Table Panel */}
                        <div className="lg:col-span-8 bg-white swiss-border flex flex-col h-[700px]">
                            <div className="p-4 swiss-border-b bg-swiss-light flex justify-between items-center">
                                <input 
                                    type="text" 
                                    placeholder="Поиск..." 
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="swiss-border px-3 py-2 text-sm font-mono focus:outline-none w-64"
                                />
                                <div className="font-mono text-xs uppercase font-bold text-gray-500">
                                    ВСЕГО: {phrases.length} | НАЙДЕНО: {filteredIndices.length}
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto overflow-x-auto custom-scrollbar">
                                <table className="w-full text-left text-sm font-mono border-collapse min-w-[600px]">
                                    <thead className="sticky top-0 bg-white swiss-border-b shadow-sm">
                                        <tr>
                                            <th className="py-3 px-4 w-12 text-center swiss-border-r bg-swiss-light">#</th>
                                            <th className="py-3 px-4 w-1/3 swiss-border-r">Исходная & Очищенная</th>
                                            <th className="py-3 px-4 w-1/3 swiss-border-r bg-swiss-light">Строка 1</th>
                                            <th className="py-3 px-4 w-1/3">Строка 2</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredIndices.map((realIndex) => {
                                            const phrase = phrases[realIndex];
                                            const isActive = activeIndex === realIndex;
                                            return (
                                                <tr 
                                                    key={realIndex} 
                                                    onClick={() => setActiveIndex(realIndex)}
                                                    className={`swiss-border-b cursor-pointer swiss-transition hover:bg-gray-100 ${isActive ? 'bg-swiss-light border-l-4 border-l-swiss-accent' : ''}`}
                                                >
                                                    <td className="py-3 px-4 text-center swiss-border-r bg-transparent text-gray-500 font-bold">
                                                        {realIndex + 1}
                                                    </td>
                                                    <td className="py-3 px-4 swiss-border-r">
                                                        <div className="text-[10px] text-gray-400 line-through mb-1 truncate max-w-[200px]" title={phrase.original}>
                                                            {phrase.original}
                                                        </div>
                                                        <input 
                                                            type="text" 
                                                            value={phrase.cleaned}
                                                            onChange={(e) => handleCleanChange(realIndex, e.target.value)}
                                                            className={`w-full bg-transparent focus:outline-none focus:border-b border-swiss-accent font-bold ${isActive ? 'text-swiss-accent' : 'text-black'}`}
                                                        />
                                                    </td>
                                                    <td className="py-3 px-4 swiss-border-r bg-transparent">
                                                        <input 
                                                            type="text" 
                                                            value={phrase.line1}
                                                            onChange={(e) => handleLineChange(realIndex, 1, e.target.value)}
                                                            className="w-full bg-white swiss-border px-2 py-1 focus:outline-none focus:border-swiss-accent"
                                                        />
                                                    </td>
                                                    <td className="py-3 px-4">
                                                        <input 
                                                            type="text" 
                                                            value={phrase.line2}
                                                            onChange={(e) => handleLineChange(realIndex, 2, e.target.value)}
                                                            className="w-full bg-white swiss-border px-2 py-1 focus:outline-none focus:border-swiss-accent"
                                                        />
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                        {filteredIndices.length === 0 && (
                                            <tr>
                                                <td colSpan="4" className="py-8 text-center text-gray-500 font-mono">Ничего не найдено</td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Preview Panel */}
                        <div className="lg:col-span-4 gap-6 flex flex-col">
                            <div className="bg-white swiss-border p-6 flex flex-col items-center shadow-lg">
                                <h2 className="font-mono font-bold uppercase border-b-2 border-black pb-2 mb-6 w-full text-center">Превью Медали</h2>
                                
                                <div className="w-48 h-48 rounded-full border-4 border-black bg-swiss-light flex flex-col items-center justify-center p-4 relative mb-6">
                                    <div className="absolute inset-2 border-2 border-dashed border-gray-300 rounded-full pointer-events-none"></div>
                                    <div className="w-full flex flex-col items-center text-center justify-center z-10">
                                        <span className="font-sans font-bold text-black uppercase tracking-wide leading-tight text-sm">
                                            {activePhrase.line1 || "СТРОКА 1"}
                                        </span>
                                        <span className="font-sans font-medium text-gray-700 tracking-wide mt-1 leading-tight text-[11px]">
                                            {activePhrase.line2}
                                        </span>
                                    </div>
                                </div>

                                <div className="w-56 h-14 ribbon-mock rounded-sm flex flex-col items-center justify-center px-4">
                                    <span className="font-sans font-bold uppercase tracking-wider text-center leading-tight text-[11px]">
                                        {activePhrase.line1 || "СТРОКА 1"}
                                    </span>
                                    <span className="font-sans font-medium text-white/80 text-center leading-tight mt-0.5 text-[9px]">
                                        {activePhrase.line2}
                                    </span>
                                </div>
                            </div>
                            
                            <div className="bg-swiss-light swiss-border p-4 font-mono text-xs text-gray-600">
                                <div className="font-bold text-black mb-2 uppercase">Правила переноса:</div>
                                <ul className="list-disc pl-4 space-y-1">
                                    <li>Предлоги (к, в, за, с, у...) всегда остаются на 2-й строке со своим словом.</li>
                                    <li>Очистка "мусорных" тегов (синяя, спортивная, фиолет) работает автоматически.</li>
                                </ul>
                            </div>
                        </div>
                    </div>

                    {/* Modal */}
                    {isImportModalOpen && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white swiss-border swiss-shadow max-w-xl w-full p-6 animate-fade-in">
                                <h3 className="font-mono font-bold text-lg mb-2 uppercase border-b-2 border-black pb-2">Импорт новых фраз</h3>
                                <p className="text-xs font-mono text-gray-600 mb-4">
                                    Вставьте список фраз из Excel (каждая с новой строки). Алгоритм автоматически очистит их и разделит на 2 строки.
                                </p>
                                <textarea 
                                    rows="8" 
                                    value={importText}
                                    onChange={(e) => setImportText(e.target.value)}
                                    placeholder="Например:&#10;Лучшие родители моих учеников&#10;За любовь к танцамфиолет" 
                                    className="w-full bg-swiss-light swiss-border p-3 text-sm focus:outline-none focus:border-swiss-accent font-mono mb-4 custom-scrollbar"
                                />
                                <div className="flex justify-end gap-3">
                                    <SwissButton variant="secondary" onClick={() => setIsImportModalOpen(false)}>
                                        ОТМЕНА
                                    </SwissButton>
                                    <SwissButton variant="primary" onClick={handleImport}>
                                        ИМПОРТИРОВАТЬ И ОЧИСТИТЬ
                                    </SwissButton>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => (
            <>
                <NavHeader />
                <LinguisticApp />
            </>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
